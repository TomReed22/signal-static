<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signal Static — Segment 1: Galaxy Generation</title>
<style>
  /* Deliberately minimal. Ugly until vertical slice — your rule, not mine. */
  body { margin: 0; background: #04070d; color: #8aa3b8; font-family: monospace; }
  #info {
    position: fixed; top: 10px; left: 10px;
    background: rgba(10,16,24,.9); border: 1px solid #16222e;
    padding: 10px; font-size: 13px; max-width: 260px;
  }
  svg {
    width: 100vw; height: 100vh; display: block;
    cursor: grab;              /* hints "you can drag this" */
    user-select: none;         /* don't select label text while panning */
  }
  svg.grabbing { cursor: grabbing; }
  circle.node { cursor: pointer; }
  circle.node:hover { stroke: #4fd8eb; stroke-width: 2; }
</style>
</head>
<body>

<div id="info">SIGNAL STATIC — seg.1<br>Click a node to inspect it.</div>
<svg id="map" viewBox="0 0 1600 900"></svg>

<script>
/* =============================================================
   SIGNAL STATIC — SEGMENT 1: THE GALAXY EXISTS
   =============================================================
   Three jobs today:
   1. A seeded random number generator (same seed = same galaxy)
   2. A node data model — think of it as your SQL table
   3. Generation + rendering

   Read top to bottom. Every block has a WHY comment.
   ============================================================= */


/* -------------------------------------------------------------
   1. SEEDED RANDOM
   ---------------------------------------------------------------
   WHY: Math.random() gives a different galaxy every refresh,
   which makes bugs impossible to reproduce. A *seeded* generator
   is a function that produces the same "random" sequence for the
   same starting number. Change SEED and you get a new galaxy;
   keep it and the galaxy is identical every time. This is also
   how "shareable galaxy seeds" work later — for free.

   (This is a standard tiny algorithm called mulberry32. You do
   not need to understand the bit-shifting line — nobody does —
   just what it gives you: a function `rng()` that returns a
   number between 0 and 1, deterministically.)
---------------------------------------------------------------- */
const SEED = 74575; // <-- change me and refresh!

function makeRng(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rng = makeRng(SEED);

// Helper: random integer between min and max, inclusive.
function randInt(min, max) {
  return Math.floor(rng() * (max - min + 1)) + min;
}

// Helper: pick a random item from an array.
function pick(arr) {
  return arr[Math.floor(rng() * arr.length)];
}


/* -------------------------------------------------------------
   2. THE DATA MODEL — your SQL brain starts here
   ---------------------------------------------------------------
   WHY: The entire game state is one array of plain objects.
   Think: SELECT * FROM nodes;
   Every future system (fog, mining, static tide, saving) will
   just read and update rows in this "table". If you keep this
   discipline — state lives HERE, rendering only *reads* it —
   you will never get the spaghetti that kills first projects.

   Columns for today (more get added in later segments):
     id        - primary key
     name      - display name
     x, y      - map position
     type      - 'star' | 'planet' | 'asteroid'
     state     - 'hidden' for everything except home (fog comes
                 in segment 2, but we design the column NOW)
---------------------------------------------------------------- */
let nodes = []; // our table


/* -------------------------------------------------------------
   3. NAME GENERATOR (flavor, but cheap and fun)
---------------------------------------------------------------- */
const PREFIXES = [
  // Astronomers
  "KEPLER", "GALILEO", "COPERNICUS", "TYCHO", "HUBBLE",
  "HERSCHEL", "BARNARD", "ROSS", "LUYTEN", "KAPTEYN",
  "LACAILLE", "LEAVITT", "PAYNE", "SAGAN", "HAWKING",
  "JANSSKY", "EDDINGTON", "NEWTON", "MAXWELL", "HALLEY",

  // Space missions & telescopes
  "GAIA", "CHANDRA", "VOYAGER", "PIONEER", "CASSINI",
  "APOLLO", "MARINER", "PATHFINDER", "DISCOVERY", "ENDEAVOUR",

  // Astronomical catalogues
  "HD", "HIP", "NGC", "IC", "LHS", "GJ", "SH", "M",

  // Mythology
  "ATLAS", "JANUS", "AETHER", "HELIOS", "HERMES",
  "PROMETHEUS", "NYX", "ERIS", "TITAN", "HYPERION",

  // Survey / exploration
  "NEXUS", "BEACON", "RELAY", "HORIZON", "PRISM",
  "VORTEX", "ECHO", "ASCENT", "MONOLITH", "AEGIS"
];

const SUFFIXES = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const ROMAN = ["I","II","III","IV","V","VI","VII","VIII","IX","X"];

function makeName() {
  const prefix = pick(PREFIXES);

  switch (randInt(0, 6)) {

    // KEPLER-418
    case 0:
      return `${prefix}-${randInt(1, 9999)}`;

    // HUBBLE 418
    case 1:
      return `${prefix} ${randInt(1, 9999)}`;

    // GAIA-418A
    case 2:
      return `${prefix}-${randInt(1, 999)}${pick(SUFFIXES)}`;

    // ATLAS 418-B
    case 3:
      return `${prefix} ${randInt(1, 999)}-${pick(SUFFIXES)}`;

    // NEXUS-IV
    case 4:
      return `${prefix}-${pick(ROMAN)}`;

    // HORIZON X-418
    case 5:
      return `${prefix} ${pick(SUFFIXES)}-${randInt(1, 999)}`;

    // HIP-4827-IV
    default:
      return `${prefix}-${randInt(1, 9999)}-${pick(ROMAN)}`;
  }
}


/* -------------------------------------------------------------
   4. GALAXY GENERATION — the jittered grid
   ---------------------------------------------------------------
   WHY: Pure random placement makes ugly clumps and overlaps.
   Trick: divide the map into grid cells, put ONE node per cell,
   then nudge it by a random offset. Organic look, guaranteed
   spacing, ten lines of code. This is the cheap cousin of
   Poisson disc sampling we talked about.
---------------------------------------------------------------- */
const MAP_W = 3200, MAP_H = 1800;   // a big, roomy galaxy — pan/zoom to explore it
const COLS = 20, ROWS = 8;          // 20x8 = 160 candidate cells
const CELL_W = MAP_W / COLS;
const CELL_H = MAP_H / ROWS;
const NODE_CHANCE = 0.1;            // ~10% of cells get a node (sparse, spread out)
const MIN_DIST = 240;               // no two nodes may sit closer than this (map units)

function generateGalaxy() {
  nodes = [];
  let id = 0;

  for (let col = 0; col < COLS; col++) {
    for (let row = 0; row < ROWS; row++) {
      if (rng() > NODE_CHANCE) continue; // this cell stays empty space

      // Cell's top-left corner, plus a jitter within the middle
      // 60% of the cell (keeps nodes off cell edges → guaranteed gaps).
      const x = col * CELL_W + CELL_W * 0.2 + rng() * CELL_W * 0.6;
      const y = row * CELL_H + CELL_H * 0.2 + rng() * CELL_H * 0.6;

      // SPACING GUARANTEE: skip this candidate if it would land too
      // close to a node we've already placed. This turns "nodes rarely
      // overlap" into "nodes never overlap".
      // CONCEPT: .some() returns true if the test passes for AT LEAST ONE
      // item in the array — here, "is any existing node nearer than
      // MIN_DIST?" If yes, we bail on this cell and leave it empty.
      if (nodes.some(other => {
        const d = Math.sqrt((other.x - x) ** 2 + (other.y - y) ** 2);
        return d < MIN_DIST;
      })) continue;

      nodes.push({
        id: id++,
        name: makeName(),
        x: Math.round(x),
        y: Math.round(y),
        type: pick(["star", "planet", "planet", "wreckage", "asteroid", "comet", "moon"]), // planets 2x likely
        state: "hidden",
      });
    }
  }

  // THE HOME NODE: SOL — EARTH sits at the DEAD CENTRE of the map.
  // WHY the change: the old version just promoted whichever generated
  // node landed *nearest* the middle — but in a sparse galaxy "nearest"
  // can still be well off-centre, which feels bad. Home is the player's
  // anchor, so we now place it deliberately at the exact centre.
  const HOME_X = MAP_W / 2, HOME_Y = MAP_H / 2;

  // First, clear out any generated node sitting right on top of the
  // centre, so SOL never overlaps a neighbour.
  // CONCEPT: .filter() builds a NEW array containing only the items for
  // which the test returns true — it's your SQL WHERE clause. Here we
  // keep every node whose distance from the centre is MORE than
  // MIN_DIST, and silently drop the rest.
  // CONCEPT: `n => { ... }` is an arrow function — a compact way to write
  // "given a node n, do this and return a result". You've seen its shape
  // in pick(); this one has a { } body because it needs two lines.
  nodes = nodes.filter(n => {
    const dist = Math.sqrt((n.x - HOME_X) ** 2 + (n.y - HOME_Y) ** 2);
    return dist > MIN_DIST;
  });

  // Then drop SOL itself in, exactly at the centre.
  nodes.push({
    id: id++,
    name: "SOL — EARTH",
    x: HOME_X,
    y: HOME_Y,
    type: "home",
    state: "revealed",
  });
}


/* -------------------------------------------------------------
   5. RENDERING — reads the table, draws the map
   ---------------------------------------------------------------
   WHY SVG: it's inspectable (right-click → inspect any node!),
   CSS hover works on it, and at our node counts performance is
   a non-issue. The golden rule: this function only READS state.
   It never changes it. Rendering is a SELECT, never an UPDATE.

   For today we render ALL nodes, including hidden ones (shown
   dim) — because as developers we want to see the whole
   generation result. Segment 2 makes hidden mean hidden.
---------------------------------------------------------------- */
const COLORS = {
  home:     "#50A8EB",
  star:     "#FFF6EA",
  planet:   "#6FE08A",
  asteroid: "#C77FA0",
  comet:    "#7C8CE0",
  wreckage: "#D64848",
  moon:     "#BBC7C5"
};

const svg = document.getElementById("map");

function render() {
  svg.innerHTML = ""; // wipe and redraw — crude but fine at this scale

  for (const n of nodes) {
    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", n.x);
    c.setAttribute("cy", n.y);
    c.setAttribute("r", n.type === "home" ? 20 : 12);
    c.setAttribute("fill", COLORS[n.type]);
    c.setAttribute("class", "node");
    c.setAttribute("opacity", n.state === "hidden" ? 0.25 : 1); // dev x-ray vision
    c.addEventListener("click", () => { if (!panMoved) inspect(n); });
    svg.appendChild(c);

    // Name label next to each node
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("x", n.x + 22);
    t.setAttribute("y", n.y + 6);
    t.setAttribute("fill", "#3d5468");
    t.setAttribute("font-size", "18");
    t.setAttribute("font-family", "monospace");
    t.textContent = n.name;
    svg.appendChild(t);
  }
}

/* -------------------------------------------------------------
   6. INSPECT — click a node, see its row
   ----------------------------------------------------------- */
function inspect(node) {
  const home = nodes.find(n => n.type === "home");

  const dist = Math.round(Math.sqrt((node.x - home.x) ** 2 + (node.y - home.y) ** 2));

  document.getElementById("info").innerHTML =
    `<b>NODE ${node.id}</b><br>` +
    `name: ${node.name}<br>` +
    `type: ${node.type}<br>` +
    `pos: ${node.x}, ${node.y}<br>` +
    `state: ${node.state}<br>` +
    `dist from home: ${dist}`;
  console.log("Inspected node:", node); // open DevTools (F12) → Console
}


/* -------------------------------------------------------------
   7. ZOOM & PAN — move the CAMERA, never the galaxy
   ---------------------------------------------------------------
   WHY: the galaxy lives on a big canvas now. We let the player
   scroll to zoom and drag to pan by changing the SVG's viewBox —
   the rectangle of map-space that gets stretched to fill the
   screen. Shrink the viewBox = zoom in; slide it = pan.

   IMPORTANT: this only moves the *camera*. It never touches the
   node data — still render-reads-only, same architecture rule.
   `view` is the camera; the galaxy underneath it doesn't move.
---------------------------------------------------------------- */
const view = { x: 0, y: 0, w: MAP_W, h: MAP_H }; // start showing the whole map
const MIN_W = MAP_W * 0.12;   // most zoomed IN  (small window = big nodes)
const MAX_W = MAP_W;          // most zoomed OUT (whole galaxy visible)

// Push the current camera rectangle onto the SVG. One place, one job.
function applyView() {
  svg.setAttribute("viewBox", `${view.x} ${view.y} ${view.w} ${view.h}`);
}

// Convert a screen pixel (where the mouse is) into MAP coordinates.
// getScreenCTM() is the browser's own screen<->SVG conversion matrix;
// inverting it turns "pixel on screen" into "point on the map".
function screenToMap(clientX, clientY) {
  const pt = svg.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

// --- SCROLL WHEEL = ZOOM, centred on the cursor -----------------
// CONCEPT: addEventListener wires a function to an event. "wheel"
// fires on scroll; e.deltaY is negative when scrolling up.
svg.addEventListener("wheel", (e) => {
  e.preventDefault();                       // don't scroll the page too
  const before = screenToMap(e.clientX, e.clientY); // map point under cursor
  const factor = e.deltaY < 0 ? 0.9 : 1.1;  // up = shrink window = zoom in
  let newW = view.w * factor;
  newW = Math.max(MIN_W, Math.min(MAX_W, newW)); // clamp to zoom limits
  const scale = newW / view.w;
  view.w = newW;
  view.h *= scale;
  // Nudge the camera so the SAME map point stays under the cursor —
  // this is what makes zoom feel like it's aimed where you point.
  view.x = before.x - (before.x - view.x) * scale;
  view.y = before.y - (before.y - view.y) * scale;
  applyView();
});

// --- DRAG = PAN -------------------------------------------------
// These three variables live out here (module scope) so the click
// handler in render() can read panMoved. panMoved tells us "the user
// dragged, don't treat the release as a node click".
let panning = false, panMoved = false, panLast = null;

svg.addEventListener("mousedown", (e) => {
  panning = true; panMoved = false;
  panLast = { x: e.clientX, y: e.clientY };
  svg.classList.add("grabbing");
});

// Listen on window (not svg) so a fast drag that leaves the element
// still keeps panning smoothly.
window.addEventListener("mousemove", (e) => {
  if (!panning) return;
  // Moved more than a few pixels? Count it as a drag, not a click.
  if (Math.abs(e.clientX - panLast.x) + Math.abs(e.clientY - panLast.y) > 3) {
    panMoved = true;
  }
  // Move the camera by the mouse's movement, measured in map units.
  const now  = screenToMap(e.clientX, e.clientY);
  const then = screenToMap(panLast.x, panLast.y);
  view.x -= now.x - then.x;
  view.y -= now.y - then.y;
  panLast = { x: e.clientX, y: e.clientY };
  applyView();
});

window.addEventListener("mouseup", () => {
  panning = false;
  svg.classList.remove("grabbing");
});


/* -------------------------------------------------------------
   RUN
---------------------------------------------------------------- */
generateGalaxy();
render();
applyView(); // point the camera at the whole map to start
console.log(`Galaxy generated: ${nodes.length} nodes from seed ${SEED}`);
console.table(nodes); // <-- SQL person, meet console.table. You're welcome.
</script>
</body>
</html>
